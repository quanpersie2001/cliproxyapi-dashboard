name: Release Please

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Warn when downstream tag workflows are disabled
        env:
          HAS_RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN != '' }}
        run: |
          if [ "$HAS_RELEASE_PLEASE_TOKEN" != "true" ]; then
            echo "::warning::RELEASE_PLEASE_TOKEN is not configured. Release Please can still open and merge release PRs, but tag-push workflows such as publish.yml will not fan out when the release is created with GITHUB_TOKEN."
          fi

      - uses: googleapis/release-please-action@v4
        with:
          # Use a PAT or GitHub App token so the tag created by Release Please can
          # trigger the downstream publish workflow. Fall back to GITHUB_TOKEN so
          # the release PR flow still works in smaller setups.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN != '' && secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
