name: Publish Dashboard Image

on:
  push:
    tags:
      - "dashboard-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing dashboard tag to rebuild (for example: dashboard-v0.1.69)"
        required: true
        type: string
      publish_latest:
        description: "Also publish the latest tag"
        required: false
        default: false
        type: boolean
      update_version_json:
        description: "Also refresh version.json on main"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/dashboard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-dashboard-${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      publish_latest: ${{ steps.meta.outputs.publish_latest }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      update_version_json: ${{ steps.meta.outputs.update_version_json }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          INPUT_UPDATE_VERSION_JSON: ${{ inputs.update_version_json }}
        run: |
          normalize_bool() {
            case "$1" in
              true|True|TRUE|1|yes|YES|on|ON) echo "true" ;;
              *) echo "false" ;;
            esac
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG_NAME"
            PUBLISH_LATEST="$(normalize_bool "$INPUT_PUBLISH_LATEST")"
            UPDATE_VERSION_JSON="$(normalize_bool "$INPUT_UPDATE_VERSION_JSON")"
          else
            TAG="${GITHUB_REF_NAME}"
            PUBLISH_LATEST=true
            UPDATE_VERSION_JSON=true
          fi

          if [[ ! "$TAG" =~ ^dashboard-v[0-9] ]]; then
            echo "Expected a dashboard-v* tag, got: $TAG" >&2
            exit 1
          fi

          VERSION="${TAG#dashboard-v}"

          echo "checkout_ref=refs/tags/$TAG" >> "$GITHUB_OUTPUT"
          echo "publish_latest=$PUBLISH_LATEST" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "update_version_json=$UPDATE_VERSION_JSON" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Verify checked out tag
        run: |
          TAG="$(git describe --tags --exact-match)"
          test "$TAG" = "${{ needs.resolve.outputs.tag_name }}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DASHBOARD_VERSION=${{ needs.resolve.outputs.tag_name }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          rm -rf /tmp/digests
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Resolve commit SHA
        id: sha
        run: |
          echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        working-directory: /tmp/digests
        shell: bash
        run: |
          TAGS="-t ${{ env.IMAGE }}:${{ needs.resolve.outputs.version }}"
          TAGS="$TAGS -t ${{ env.IMAGE }}:sha-${{ steps.sha.outputs.short }}"

          if [ "${{ needs.resolve.outputs.publish_latest }}" = "true" ]; then
            TAGS="$TAGS -t ${{ env.IMAGE }}:latest"
          fi

          SOURCES=""
          for digest in *; do
            SOURCES="$SOURCES ${{ env.IMAGE }}@sha256:$digest"
          done

          echo "Publishing image tags:$TAGS"
          docker buildx imagetools create $TAGS $SOURCES

  update-version-json:
    needs: [resolve, merge]
    if: ${{ needs.resolve.outputs.update_version_json == 'true' && needs.merge.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update version.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          RELEASE_NOTES=$(gh release view "${TAG_NAME}" --json body -q .body 2>/dev/null | head -c 2000 || echo "")

          jq -n \
            --arg version "${VERSION}" \
            --arg tag "${TAG_NAME}" \
            --arg url "${RELEASE_URL}" \
            --arg notes "${RELEASE_NOTES}" \
            '{version: $version, tag: $tag, releaseUrl: $url, releaseNotes: $notes}' \
            > version.json

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update version.json to ${{ needs.resolve.outputs.version }}"
          git push
