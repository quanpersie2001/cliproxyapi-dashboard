- id: deploy-dashboard
  execute-command: "{{INSTALL_DIR}}/infrastructure/deploy.sh"
  command-working-directory: "{{INSTALL_DIR}}/infrastructure"
  trigger-rule:
    and:
      - match:
          type: value
          value: "{{DEPLOY_SECRET}}"
          parameter:
            source: header
            name: X-Deploy-Token

- id: deploy-status
  execute-command: /bin/cat
  command-working-directory: "{{LOG_DIR}}"
  pass-arguments-to-command:
    - source: string
      name: "{{LOG_DIR}}/dashboard-deploy-status.json"
  trigger-rule:
    and:
      - match:
          type: value
          value: "{{DEPLOY_SECRET}}"
          parameter:
            source: header
            name: X-Deploy-Token

- id: deploy-log
  execute-command: /bin/cat
  command-working-directory: "{{LOG_DIR}}"
  pass-arguments-to-command:
    - source: string
      name: "{{LOG_DIR}}/dashboard-deploy.log"
  trigger-rule:
    and:
      - match:
          type: value
          value: "{{DEPLOY_SECRET}}"
          parameter:
            source: header
            name: X-Deploy-Token
